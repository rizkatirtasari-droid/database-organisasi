<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Organisasi Kemasyarakatan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        .tab {
            flex: 1;
            padding: 15px 20px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            background: white;
            border-bottom-color: #3498db;
            color: #3498db;
            font-weight: bold;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 14px;
        }

        input, select, textarea {
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 15px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: linear-gradient(135deg, #34495e, #2c3e50);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ Database Organisasi Kemasyarakatan</h1>
            <p>Sistem Informasi Lengkap Organisasi Masyarakat</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('input')">📝 Input Data</button>
            <button class="tab" onclick="showTab('data')">📊 Lihat Data</button>
        </div>

        <!-- TAB INPUT DATA -->
        <div id="input" class="tab-content active">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalData">0</div>
                    <div>Total Organisasi</div>
                </div>
            </div>

            <form id="organizationForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nomor *</label>
                        <input type="text" id="nomor" required>
                    </div>
                    <div class="form-group">
                        <label>Nama Lembaga *</label>
                        <input type="text" id="nama_lembaga" required>
                    </div>
                    <div class="form-group">
                        <label>Jenis Lembaga *</label>
                        <select id="jenis_lembaga" required>
                            <option value="">Pilih Jenis</option>
                            <option value="LSM">LSM</option>
                            <option value="Yayasan">Yayasan</option>
                            <option value="Paguyuban">Paguyuban</option>
                            <option value="Karang Taruna">Karang Taruna</option>
                            <option value="PKL">PKL</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Alamat Lembaga *</label>
                        <textarea id="alamat_lembaga" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Telephone</label>
                        <input type="tel" id="telephone">
                    </div>
                    <div class="form-group">
                        <label>Tupoksi</label>
                        <textarea id="tupoksi"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Jenis Kegiatan Lembaga</label>
                        <textarea id="jenis_kegiatan"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Status Badan Hukum</label>
                        <select id="status_badan_hukum">
                            <option value="">Pilih Status</option>
                            <option value="Terdaftar">Terdaftar</option>
                            <option value="Belum Terdaftar">Belum Terdaftar</option>
                            <option value="Proses">Proses</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nomor Badan Hukum</label>
                        <input type="text" id="nomor_badan_hukum">
                    </div>
                    <div class="form-group">
                        <label>Tanggal</label>
                        <input type="date" id="tanggal">
                    </div>
                    <div class="form-group">
                        <label>Ketua</label>
                        <input type="text" id="ketua">
                    </div>
                    <div class="form-group">
                        <label>Sekretaris</label>
                        <input type="text" id="sekretaris">
                    </div>
                    <div class="form-group">
                        <label>Bendahara</label>
                        <input type="text" id="bendahara">
                    </div>
                    <div class="form-group">
                        <label>Tanggal Berdiri</label>
                        <input type="date" id="tanggal_berdiri">
                    </div>
                    <div class="form-group">
                        <label>Periode Kepengurusan</label>
                        <input type="text" id="periode_kepengurusan" placeholder="2024-2029">
                    </div>
                    <div class="form-group">
                        <label>NPWP</label>
                        <input type="text" id="npwp">
                    </div>
                    <div class="form-group">
                        <label>Keterangan</label>
                        <textarea id="keterangan"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="status">
                            <option value="">Pilih Status</option>
                            <option value="Aktif">Aktif</option>
                            <option value="Tidak Aktif">Tidak Aktif</option>
                            <option value="Pencabutan">Pencabutan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Kode Arsip</label>
                        <input type="text" id="kode_arsip">
                    </div>
                    <div class="form-group">
                        <label>Tanggal Pendataan</label>
                        <input type="date" id="tanggal_pendataan">
                    </div>
                </div>
                <div style="text-align: center;">
                    <button type="submit" class="btn">💾 Simpan Data</button>
                    <button type="button" class="btn btn-danger" onclick="clearForm()" style="margin-left: 15px;">🗑️ Reset Form</button>
                </div>
            </form>
        </div>

        <!-- TAB DATA -->
        <div id="data" class="tab-content">
            <div style="text-align: right; margin-bottom: 20px;">
                <input type="text" id="searchInput" placeholder="🔍 Cari data..." style="padding: 10px; border: 2px solid #ddd; border-radius: 8px; width: 300px;">
                <button class="btn" onclick="exportData()" style="margin-left: 10px;">📥 Export Excel</button>
            </div>
            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama Lembaga</th>
                            <th>Jenis Lembaga</th>
                            <th>Alamat</th>
                            <th>Telephone</th>
                            <th>Ketua</th>
                            <th>Status</th>
                            <th>Tanggal Pendataan</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let organizations = JSON.parse(localStorage.getItem('organizations')) || [];
        let nextId = organizations.length > 0 ? Math.max(...organizations.map(o => parseInt(o.nomor))) + 1 : 1;

        // Update stats
        function updateStats() {
            document.getElementById('totalData').textContent = organizations.length;
        }

        // Show tabs
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'data') {
                renderTable();
            }
        }

        // Form submit
        document.getElementById('organizationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                id: Date.now(),
                nomor: document.getElementById('nomor').value,
                nama_lembaga: document.getElementById('nama_lembaga').value,
                jenis_lembaga: document.getElementById('jenis_lembaga').value,
                alamat_lembaga: document.getElementById('alamat_lembaga').value,
                telephone: document.getElementById('telephone').value,
                tupoksi: document.getElementById('tupoksi').value,
                jenis_kegiatan: document.getElementById('jenis_kegiatan').value,
                status_badan_hukum: document.getElementById('status_badan_hukum').value,
                nomor_badan_hukum: document.getElementById('nomor_badan_hukum').value,
                tanggal: document.getElementById('tanggal').value,
                ketua: document.getElementById('ketua').value,
                sekretaris: document.getElementById('sekretaris').value,
                bendahara: document.getElementById('bendahara').value,
                tanggal_berdiri: document.getElementById('tanggal_berdiri').value,
                periode_kepengurusan: document.getElementById('periode_kepengurusan').value,
                npwp: document.getElementById('npwp').value,
                keterangan: document.getElementById('keterangan').value,
                status: document.getElementById('status').value,
                kode_arsip: document.getElementById('kode_arsip').value,
                tanggal_pendataan: document.getElementById('tanggal_pendataan').value
            };

            organizations.push(formData);
            localStorage.setItem('organizations', JSON.stringify(organizations));
            
            updateStats();
            alert('✅ Data berhasil disimpan!');
            this.reset();
            document.getElementById('tanggal_pendataan').valueAsDate = new Date();
        });

        // Render table
        function renderTable(data = organizations) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach((org, index) => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${org.nomor}</td>
                    <td>${org.nama_lembaga}</td>
                    <td>${org.jenis_lembaga}</td>
                    <td>${org.alamat_lembaga.substring(0, 50)}${org.alamat_lembaga.length > 50 ? '...' : ''}</td>
                    <td>${org.telephone || '-'}</td>
                    <td>${org.ketua || '-'}</td>
                    <td><span style="padding: 4px 8px; border-radius: 20px; background: ${org.status === 'Aktif' ? '#d4edda' : '#f8d7da'}; color: ${org.status === 'Aktif' ? '#155724' : '#721c24'}; font-size: 12px; font-weight: bold;">${org.status || '-'}</span></td>
                    <td>${org.tanggal_pendataan || '-'}</td>
                    <td>
                        <button class="btn" onclick="editData(${org.id})" style="padding: 8px 12px; font-size: 12px; margin-right: 5px;">✏️ Edit</button>
                        <button class="btn btn-danger" onclick="deleteData(${org.id})" style="padding: 8px 12px; font-size: 12px;">🗑️ Hapus</button>
                    </td>
                `;
            });
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredData = organizations.filter(org => 
                org.nama_lembaga.toLowerCase().includes(searchTerm) ||
                org.jenis_lembaga.toLowerCase().includes(searchTerm) ||
                org.ketua.toLowerCase().includes(searchTerm)
            );
            renderTable(filteredData);
        });

        // Clear form
        function clearForm() {
            document.getElementById('organizationForm').reset();
            document.getElementById('tanggal_pendataan').valueAsDate = new Date();
        }

        // Delete data
        function deleteData(id) {
            if (confirm('Yakin ingin menghapus data ini?')) {
                organizations = organizations.filter(org => org.id !== id);
                localStorage.setItem('organizations', JSON.stringify(organizations));
                updateStats();
                renderTable();
            }
        }

        // Edit data (basic implementation)
        function editData(id) {
            const org = organizations.find(o => o.id === id);
            if (org) {
                // Populate form with data
                Object.keys(org).forEach(key => {
                    const element = document.getElementById(key);
                    if (
